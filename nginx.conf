server {
    listen 80;
    server_name baragnas.fr www.baragnas.fr;

    root /var/www/baragnas_web_v2/dist;
    index index.html;

    # SPA routing - redirige toutes les requêtes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache les fichiers statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
